# ============================================================================
#  ned.ini  --  LinuxCNC INI for the "ned" mill   (companion to ned.hal)
#
#  Machine: X is a GANTRY (joints 0 + 3 = X1 + W tandem), Y cross, Z vertical,
#           one VFD spindle, full drawbar tool change.
#  Cards:   Mesa 7I97T (hm2_eth) + 7I85S + 7I84U.
#
#  >>> Anything marked  TUNE  or  CONFIRM  is a placeholder. Do not trust the
#  >>> numbers until measured/tuned on the real machine. Geometry, scales, PID,
#  >>> velocities and limits below are SAFE-ish starting guesses, nothing more.
#
#  UNITS: set to mm (datasheets for this machine are metric). If the machine is
#  actually inch, change [TRAJ]LINEAR_UNITS and every scale/limit/velocity.   CONFIRM
# ============================================================================

[EMC]
MACHINE = ned
VERSION = 1.0
DEBUG = 0

[DISPLAY]
DISPLAY = axis
CYCLE_TIME = 0.05
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.5
MAX_SPINDLE_OVERRIDE = 1.2
MIN_SPINDLE_OVERRIDE = 0.2
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 2
PROGRAM_PREFIX = /home/brains/linuxcnc/nc_files
INCREMENTS = 10 mm, 1 mm, 0.1 mm, 0.01 mm
SPINDLES = 1
DEFAULT_LINEAR_VELOCITY = 20
MAX_LINEAR_VELOCITY = 50

[KINS]
JOINTS = 4
# Duplicated X -> joint 0 and joint 3 form the gantry. No gantry.comp needed.
KINEMATICS = trivkins coordinates=XYZX kinstype=B

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

# Board IP and firmware CONFIG string are set in ned.hal's `loadrt hm2_eth`
# line (kept literal there). Edit them there, not here.   CONFIRM via show pin.

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
PARAMETER_FILE = ned.var
SUBROUTINE_PATH = ../../nc_files/subroutines
# Automatic drawbar M6 sequence (purge->release->wait down->swap->clamp->wait up)
# goes here as a Python remap once you're past jogging. The HAL already exposes
# all the drawbar/purge/toolsetter I/O on motion.digital-* pins.
# REMAP = M6  modalgroup=6  prolog=change_prolog  ngc=toolchange  epilog=change_epilog

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[HAL]
HALFILE = ned.hal
# POSTGUI_HALFILE = postgui.hal      # add if/when you build a custom GUI panel

[HALUI]

[TRAJ]
COORDINATES = X Y Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
SPINDLES = 1
DEFAULT_LINEAR_VELOCITY = 20
MAX_LINEAR_VELOCITY = 50
NO_FORCE_HOMING = 0

# ----------------------------------------------------------------------------
#  SPINDLE  (pwmgen.04 -> +/-10 V to the VFD; MAX_FORWARD_VELOCITY -> 10 V)
# ----------------------------------------------------------------------------
[SPINDLE_0]
MAX_FORWARD_VELOCITY = 24000      # TUNE: spindle RPM at 10 V (match VFD max-freq scaling)
MIN_FORWARD_VELOCITY = 1000
MAX_REVERSE_VELOCITY = 24000

# ============================================================================
#  AXES  (Cartesian limits/velocities the user/GUI see)
# ============================================================================
[AXIS_X]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -0.001
MAX_LIMIT = 1500                  # TUNE: X travel (mm)

[AXIS_Y]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -0.001
MAX_LIMIT = 800                   # TUNE: Y travel (mm)

[AXIS_Z]
MAX_VELOCITY = 40
MAX_ACCELERATION = 400
MIN_LIMIT = -400                  # TUNE: Z travel (mm)
MAX_LIMIT = 0.001

# ============================================================================
#  JOINTS  (one per servo. Gantry = joints 0 and 3, both axis X.)
#  TUNE every value: INPUT_SCALE (enc counts/mm = PPR*4 / screw_pitch_mm),
#  OUTPUT_SCALE (units/s commanded at 10 V = drive rated speed in mm/s),
#  PID, FERROR, HOME_OFFSET/HOME positions.
# ============================================================================

# ---- Joint 0 : X  (gantry side 1) -----------------------------------------
[JOINT_0]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -0.001
MAX_LIMIT = 1500
# servo loop
P = 50.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 10.0
INPUT_SCALE  = 1000.0             # TUNE  enc counts per mm
OUTPUT_SCALE = 50.0               # TUNE  mm/s at 10 V
# homing (gantry: joints 0 & 3 share HOME_SEQUENCE -1 -> home together,
#  each to its own switch so the bridge squares)
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = -10.0
HOME_LATCH_VEL = -1.0
HOME_SEQUENCE = -1
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = YES

# ---- Joint 1 : Y  (cross) -------------------------------------------------
[JOINT_1]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -0.001
MAX_LIMIT = 800
P = 50.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 10.0
INPUT_SCALE  = 1000.0             # TUNE
OUTPUT_SCALE = 50.0               # TUNE
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = -10.0
HOME_LATCH_VEL = -1.0
HOME_SEQUENCE = 2
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = YES

# ---- Joint 2 : Z  (vertical) ----------------------------------------------
[JOINT_2]
TYPE = LINEAR
MAX_VELOCITY = 40
MAX_ACCELERATION = 400
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -400
MAX_LIMIT = 0.001
P = 50.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 10.0
INPUT_SCALE  = 1000.0             # TUNE
OUTPUT_SCALE = 40.0               # TUNE
# Z homes first and to the TOP (positive), for safety.
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 10.0
HOME_LATCH_VEL = 1.0
HOME_SEQUENCE = 0
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = YES

# ---- Joint 3 : X  (gantry side 2 / "W") -----------------------------------
[JOINT_3]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -0.001
MAX_LIMIT = 1500
P = 50.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 10.0
INPUT_SCALE  = 1000.0             # TUNE
OUTPUT_SCALE = 50.0               # TUNE
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = -10.0
HOME_LATCH_VEL = -1.0
HOME_SEQUENCE = -1
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = YES
