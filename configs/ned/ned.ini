# ============================================================================
#  ned.ini  --  LinuxCNC INI for the "ned" mill   (companion to ned.hal)
#
#  Machine: X is a GANTRY (joints 0 + 3 = X1 + W tandem), Y cross, Z vertical,
#           one VFD spindle, full drawbar tool change.
#  Cards:   Mesa 7I97T (hm2_eth) + 7I85S + 7I84U.
#  Component models/ratings live in docs/components.md (source of truth), not here.
#
#  ----------------------------------------------------------------------------
#  APPROVAL STATUS  (added at user request):
#    # NOT APPROVED  = placeholder / guess. NOT confirmed by the user. Do not
#                      trust until measured, pulled from the Fagor params, or
#                      explicitly approved.
#    Untagged        = structural decisions already confirmed in discussion
#                      (kinematics shape, joint count, axis letters, #spindles).
#    Scope: tags cover MACHINE/MOTION parameters. Pure-software/display settings
#    are stock defaults; ask if you want those reviewed too.
#    NOTE: same machine/drives/motors as the Fagor -> travel, scaling, vel/accel
#    should be lifted from the Fagor parameter list; PID translated from it.
#  ----------------------------------------------------------------------------
# ============================================================================

[EMC]
MACHINE = ned
VERSION = 1.1
DEBUG = 0

[DISPLAY]
DISPLAY = axis
CYCLE_TIME = 0.05
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.5
MAX_SPINDLE_OVERRIDE = 1.2
MIN_SPINDLE_OVERRIDE = 0.2
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 2
PROGRAM_PREFIX = /home/brains/linuxcnc/nc_files
INCREMENTS = 10 mm, 1 mm, 0.1 mm, 0.01 mm
SPINDLES = 1
DEFAULT_LINEAR_VELOCITY = 20
MAX_LINEAR_VELOCITY = 50

[KINS]
JOINTS = 7
# Duplicated X -> joints 0 & 3 form the gantry. Joint 4 = B (workpiece rotary about
# Y: the 2 mirrored steppers driven as ONE stepgen). Joints 5 = A (swivel-head TILT
# about X/W) and 6 = C (swivel-head SPIN about Z) are the HEAD -- defined now but
# INERT (parked 0, loopback feedback) until the head is driven. trivkins identity is
# exact while A,C = 0; an A/C-head RTCP kinematics drops in later (same joints, HAL).
KINEMATICS = trivkins coordinates=XYZXBAC kinstype=B

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
PARAMETER_FILE = ned.var
SUBROUTINE_PATH = ../../nc_files/subroutines
# Automatic drawbar M6 sequence (purge->release->wait down->swap->clamp->wait up)
# goes here as a Python remap once you're past jogging. The HAL already exposes
# all the drawbar/purge/toolsetter I/O on motion.digital-* pins.
# REMAP = M6  modalgroup=6  prolog=change_prolog  ngc=toolchange  epilog=change_epilog

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[HAL]
HALFILE = ned.hal
# POSTGUI_HALFILE = postgui.hal      # add if/when you build a custom GUI panel

[HALUI]

[TRAJ]
COORDINATES = X Y Z X B A C
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
SPINDLES = 1
DEFAULT_LINEAR_VELOCITY = 20
MAX_LINEAR_VELOCITY = 50
NO_FORCE_HOMING = 0

# ----------------------------------------------------------------------------
#  SPINDLE  (pwmgen.04 -> +/-10 V to the VFD; MAX_FORWARD_VELOCITY -> 10 V)
# ----------------------------------------------------------------------------
[SPINDLE_0]
MAX_FORWARD_VELOCITY = 24000
MIN_FORWARD_VELOCITY = 1000
MAX_REVERSE_VELOCITY = 24000

# ============================================================================
#  AXES  (Cartesian limits/velocities the user/GUI see)
# ============================================================================
[AXIS_X]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -0.001
MAX_LIMIT = 1500

[AXIS_Y]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -0.001
MAX_LIMIT = 800

[AXIS_Z]
MAX_VELOCITY = 40
MAX_ACCELERATION = 400
MIN_LIMIT = -400.0
MAX_LIMIT = 0.001

# B = workpiece rotary (degrees, about Y). LIVE. Free-spinning -> huge soft limits.
[AXIS_B]
MAX_VELOCITY = 30
MAX_ACCELERATION = 300
MIN_LIMIT = -3600000
MAX_LIMIT = 3600000

# A = swivel-head TILT (degrees, about X/W). INERT (head not driven yet); parked 0.
# Limits NOT APPROVED -- placeholder tilt range.
[AXIS_A]
MAX_VELOCITY = 30
MAX_ACCELERATION = 300
MIN_LIMIT = -120.0
MAX_LIMIT = 120.0

# C = swivel-head SPIN (degrees, about Z). INERT; parked 0. Continuous -> huge limits.
[AXIS_C]
MAX_VELOCITY = 30
MAX_ACCELERATION = 300
MIN_LIMIT = -3600000
MAX_LIMIT = 3600000

# ============================================================================
#  JOINTS  (servos 0-3 = X/Y/Z/X via 7I97 analog; joint 4 = A rotary via 7I85S
#  stepgen. Gantry = joints 0 and 3, both axis X.)
#  Every numeric value below is NOT APPROVED -- placeholders. INPUT_SCALE,
#  OUTPUT_SCALE, PID, FERROR, limits, HOME positions/vels all need to come from
#  the Fagor params / measurement and your sign-off.
# ============================================================================

# ---- Joint 0 : X  (gantry side 1) -----------------------------------------
[JOINT_0]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -0.001
MAX_LIMIT = 1500
P = 50.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 10.0
INPUT_SCALE  = 1000.0
OUTPUT_SCALE = 50.0
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = -10.0
HOME_LATCH_VEL = -1.0
HOME_SEQUENCE = -1
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = YES

# ---- Joint 1 : Y  (cross) -------------------------------------------------
[JOINT_1]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -0.001
MAX_LIMIT = 800
P = 50.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 10.0
INPUT_SCALE  = 1000.0
OUTPUT_SCALE = 50.0
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = -10.0
HOME_LATCH_VEL = -1.0
HOME_SEQUENCE = 2
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = YES

# ---- Joint 2 : Z  (vertical) ----------------------------------------------
[JOINT_2]
TYPE = LINEAR
MAX_VELOCITY = 40
MAX_ACCELERATION = 400
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -400.0
MAX_LIMIT = 0.001
P = 50.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 10.0
INPUT_SCALE  = 1000.0
OUTPUT_SCALE = 40.0
# Z homes first and to the TOP (positive), for safety.
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 10.0
HOME_LATCH_VEL = 1.0
HOME_SEQUENCE = 0
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = YES

# ---- Joint 3 : X  (gantry side 2 / "W") -----------------------------------
[JOINT_3]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -0.001
MAX_LIMIT = 1500
P = 50.0
I = 0.0
D = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
BIAS = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 10.0
INPUT_SCALE  = 1000.0
OUTPUT_SCALE = 50.0
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = -10.0
HOME_LATCH_VEL = -1.0
HOME_SEQUENCE = -1
HOME_USE_INDEX = NO
HOME_IGNORE_LIMITS = YES

# ---- Joint 4 : B  (workpiece rotary, about Y) -----------------------------
#  2 mirrored steppers driven as ONE stepgen on the 7I85S (one motor reversed
#  in copper). Open-loop step/dir -> stepgen POSITION mode, NO PID.
#  SCALE = motor_steps/rev * microstep * gear_ratio / 360.
[JOINT_4]
TYPE = ANGULAR
MAX_VELOCITY = 30
MAX_ACCELERATION = 300
STEPGEN_MAXVEL = 36
STEPGEN_MAXACCEL = 450
SCALE = 88.889
FERROR = 2.0
MIN_FERROR = 1.0
MIN_LIMIT = -3600000
MAX_LIMIT = 3600000                  
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 3
HOME_USE_INDEX = NO

# ---- Joint 5 : A  (swivel-head TILT, about X/W) ---------------------------
#  INERT. No hardware: feedback is looped from command in HAL so it never
#  faults. Immediate home at 0 (HOME_SEARCH_VEL = 0). No amp-enable wired.
[JOINT_5]
TYPE = ANGULAR
MAX_VELOCITY = 30
MAX_ACCELERATION = 300
FERROR = 5.0
MIN_FERROR = 1.0
MIN_LIMIT = -120.0
MAX_LIMIT = 120.0
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 4
HOME_USE_INDEX = NO

# ---- Joint 6 : C  (swivel-head SPIN, about Z) -----------------------------
#  INERT. Same loopback pattern as joint 5.
[JOINT_6]
TYPE = ANGULAR
MAX_VELOCITY = 30
MAX_ACCELERATION = 300
FERROR = 5.0
MIN_FERROR = 1.0
MIN_LIMIT = -3600000
MAX_LIMIT = 3600000
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 5
HOME_USE_INDEX = NO
