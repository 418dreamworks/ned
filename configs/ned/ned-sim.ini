# ============================================================================
#  ned-sim.ini  --  SIMULATION config for ned (loads ned-sim.hal)
#  Lean: no PID/scale (loopback follows perfectly). Instant homing (no switches).
#  Launch:  linuxcnc ~/linuxcnc/configs/ned/ned-sim.ini
# ============================================================================

[EMC]
MACHINE = ned-sim
VERSION = 1.1

[DISPLAY]
DISPLAY = axis
CYCLE_TIME = 0.05
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.5
MAX_SPINDLE_OVERRIDE = 1.2
MIN_SPINDLE_OVERRIDE = 0.2
PROGRAM_PREFIX = /home/brains/linuxcnc/nc_files
INCREMENTS = 10 mm, 1 mm, 0.1 mm, 0.01 mm
SPINDLES = 1
MAX_LINEAR_VELOCITY = 50
DEFAULT_LINEAR_VELOCITY = 20

[KINS]
JOINTS = 4
KINEMATICS = trivkins coordinates=XYZX kinstype=B

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
PARAMETER_FILE = ned-sim.var

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[HAL]
HALFILE = ned-sim.hal

[TRAJ]
COORDINATES = X Y Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
SPINDLES = 1
MAX_LINEAR_VELOCITY = 50
DEFAULT_LINEAR_VELOCITY = 20

[SPINDLE_0]
MAX_FORWARD_VELOCITY = 24000
MIN_FORWARD_VELOCITY = 1000
MAX_REVERSE_VELOCITY = 24000

[AXIS_X]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -0.001
MAX_LIMIT = 1500

[AXIS_Y]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -0.001
MAX_LIMIT = 800

[AXIS_Z]
MAX_VELOCITY = 40
MAX_ACCELERATION = 400
MIN_LIMIT = -400
MAX_LIMIT = 0.001

# --- Joints: instant home (HOME_SEARCH_VEL/LATCH = 0 -> home at current pos) ---
[JOINT_0]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -0.001
MAX_LIMIT = 1500
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = -1

[JOINT_1]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -0.001
MAX_LIMIT = 800
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 2

[JOINT_2]
TYPE = LINEAR
MAX_VELOCITY = 40
MAX_ACCELERATION = 400
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -400
MAX_LIMIT = 0.001
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 0

[JOINT_3]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
FERROR = 1.0
MIN_FERROR = 0.25
MIN_LIMIT = -0.001
MAX_LIMIT = 1500
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = -1
